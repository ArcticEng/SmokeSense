; SmokeSense — PlatformIO Configuration
; Arctic Engineering — April 2026
;
; Project structure:
;   firmware/platformio.ini              (this file)
;   firmware/SmokeSense_DataGuard.ino    (built by env:esp32dev)
;   firmware/*.h                          (driver/config headers)
;
; Three sketches live side-by-side in this folder (DataGuard, Gateway, MQTT),
; each with its own setup()/loop(). They MUST NOT be compiled together or the
; linker sees duplicate setup/loop/globals. We therefore set src_dir to the
; firmware root and use build_src_filter to compile exactly ONE sketch per
; environment. `pio run` (no -e) builds only DataGuard via default_envs.

[platformio]
src_dir = .
default_envs = esp32dev

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed  = 921600

; Compile ONLY the DataGuard sketch (+ its .h headers, which are pulled in via
; #include and are not standalone translation units).
build_src_filter =
    +<SmokeSense_DataGuard.ino>
    -<SmokeSense_Gateway.ino>
    -<SmokeSense_MQTT.ino>

lib_deps =
    fastled/FastLED @ ^3.7.0
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0.0
    adafruit/Adafruit ADS1X15 @ ^2.5.0
    adafruit/Adafruit BME680 Library @ ^2.0.4
    adafruit/Adafruit MAX31865 library @ ^1.6.2

build_flags =
    -D CORE_DEBUG_LEVEL=1
    -D MQTT_MAX_PACKET_SIZE=2560

[env:esp32dev-debug]
extends = env:esp32dev
build_flags =
    -D CORE_DEBUG_LEVEL=4
    -D MQTT_MAX_PACKET_SIZE=2560
monitor_filters = esp32_exception_decoder
