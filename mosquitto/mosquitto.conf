# SmokeSense Private MQTT Broker — Mosquitto Config
# Deploy on Railway as a separate service

# Listeners
listener 1883
protocol mqtt

listener 9001
protocol websockets

# Authentication — require username/password
allow_anonymous false
password_file /mosquitto/config/password_file

# Access control
acl_file /mosquitto/config/acl_file

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true

# Performance
max_inflight_messages 200
max_queued_messages 5000
message_size_limit 10240

# Keepalive
max_keepalive 120
